    <!-- Body Start -->
    <h2 class="text-center my-2 text-decoration-underline">Update Product</h2>
    <div class="border border-warning shadow p-3 mb-5 bg-body-tertiary rounded bd">
        <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Name</label>
            <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="Name" required>
        </div>
        <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Price</label>
            <input type="text" class="form-control" id="exampleFormControlInput1" placeholder="Price" required>
        </div>
        <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Quantity</label>
            <input type="number" class="form-control" id="exampleFormControlInput1" placeholder="Quantity" required>
        </div>
        <div class="input-group mb-3">
            <label class="input-group-text" for="inputGroupSelect01">Category</label>
            <select class="form-select" id="inputGroupSelect01">
                <option selected>Pizza</option>
                <option value="1">Appetizer</option>
                <option value="2">Beverages</option>
                <option value="3">Pasta</option>
                <option value="4">Salad</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="exampleFormControlTextarea1" class="form-label">Description</label>
            <textarea class="form-control" id="exampleFormControlTextarea1" rows="3" placeholder="Description"
                required></textarea>
        </div>
        <div class="mb-3 container-fluid">
            <input class="btn btn-outline-success sub" type="submit" value="Update Now">
        </div>
        <div class="mb-3 container-fluid">
            <input class="btn btn-outline-success sub" type="reset" value="Reset">
        </div>
    </div>
